# One-off: create the Woodwind instrument role and print its ID.

name: Create Woodwind role

on:
  workflow_dispatch: {}

jobs:
  create:
    runs-on: ubuntu-latest
    steps:
      - name: Create role
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.NIGHTINGALE_DISCORD_BOT_TOKEN }}
          GUILD_ID: "1475433665537511536"
        run: |
          set -euo pipefail
          id=$(curl -sS -X POST \
            -H "Authorization: Bot $DISCORD_BOT_TOKEN" -H "User-Agent: ng" \
            -H "Content-Type: application/json" \
            -H "X-Audit-Log-Reason: Woodwind reaction role" \
            -d '{"name":"Woodwind","mentionable":false}' \
            "https://discord.com/api/v10/guilds/$GUILD_ID/roles" | jq -r '.id')
          echo "Woodwind -> $id"
