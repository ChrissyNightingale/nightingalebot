# NightingaleBot watch loop.
#
# Runs every 10 minutes via cron, polls Spotify / YouTube / Twitch for new
# activity from Chrissy Nightingale, and posts to the appropriate Discord
# channels. State (last-seen IDs, twitch live flag) is persisted in state.json
# and committed back to the repo by this workflow.
#
# Required repo secrets:
#   NIGHTINGALE_DISCORD_BOT_TOKEN  — Bot token for the NightingaleBot Discord app.
#   SPOTIFY_CLIENT_ID              — Spotify Developer app client ID.
#   SPOTIFY_CLIENT_SECRET          — Spotify Developer app client secret.
#   TWITCH_CLIENT_ID               — Twitch Developer app client ID.
#   TWITCH_CLIENT_SECRET           — Twitch Developer app client secret.

name: NightingaleBot watch

# Schedule removed — the recurring tick now runs in-process on the XP bot
# (Fly.io, gateway-connected). This workflow stays alive for one-off admin
# actions only: list_roles, list_channels, list_emojis, post_rules,
# post_instruments, post_notifications, simulate_twitch, post_all_merch,
# welcome_user.
on:
  workflow_dispatch:
    inputs:
      simulate_twitch:
        description: 'Post a fake Twitch live embed (test the wiring without going live).'
        required: false
        default: false
        type: boolean
      post_all_merch:
        description: 'One-off: post every current product on the storefront to the merch channel.'
        required: false
        default: false
        type: boolean
      list_roles:
        description: 'One-off: dump guild role IDs + mentionable flag to logs.'
        required: false
        default: false
        type: boolean
      list_channels:
        description: 'One-off: dump guild channel IDs + names to logs.'
        required: false
        default: false
        type: boolean
      list_emojis:
        description: 'One-off: dump custom emoji IDs + names to logs.'
        required: false
        default: false
        type: boolean
      welcome_user:
        description: 'One-off: send the join-welcome message to a specific username.'
        required: false
        default: ''
        type: string
      post_rules:
        description: 'One-off: post the server rules to #rules and seed the checkmark reaction.'
        required: false
        default: false
        type: boolean
      post_instruments:
        description: 'One-off: post the instruments reaction-role message to #reaction-roles.'
        required: false
        default: false
        type: boolean
      post_notifications:
        description: 'One-off: post the notifications reaction-role message to #reaction-roles.'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: nightingalebot-watch
  cancel-in-progress: false

jobs:
  watch:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Run watcher
        env:
          NIGHTINGALE_DISCORD_BOT_TOKEN: ${{ secrets.NIGHTINGALE_DISCORD_BOT_TOKEN }}
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
          TWITCH_CLIENT_ID: ${{ secrets.TWITCH_CLIENT_ID }}
          TWITCH_CLIENT_SECRET: ${{ secrets.TWITCH_CLIENT_SECRET }}
          SIMULATE_TWITCH: ${{ inputs.simulate_twitch && '1' || '0' }}
          POST_ALL_MERCH: ${{ inputs.post_all_merch && '1' || '0' }}
          LIST_ROLES: ${{ inputs.list_roles && '1' || '0' }}
          LIST_CHANNELS: ${{ inputs.list_channels && '1' || '0' }}
          LIST_EMOJIS: ${{ inputs.list_emojis && '1' || '0' }}
          WELCOME_USER: ${{ inputs.welcome_user }}
          POST_RULES: ${{ inputs.post_rules && '1' || '0' }}
          POST_INSTRUMENTS: ${{ inputs.post_instruments && '1' || '0' }}
          POST_NOTIFICATIONS: ${{ inputs.post_notifications && '1' || '0' }}
        run: node src/index.js

      - name: Commit state changes
        run: |
          git config user.name "nightingalebot[bot]"
          git config user.email "bot@chrissynightingale.com"
          if [ -n "$(git status --porcelain state.json)" ]; then
            git add state.json
            git commit -m "chore: update watcher state [skip ci]"
            git push
          else
            echo "No state changes."
          fi
